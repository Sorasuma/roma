<title>Choosing a character...</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#181818;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
}

img{
    width:180px;
    user-select:none;
    pointer-events:none;
    animation: bounce 0.55s infinite ease-in-out;
}

p{
    color:white;
    margin-top:24px;
    font-size:22px;
    opacity:.85;
}

@keyframes bounce{
0%{transform:translateY(0) scaleX(1) scaleY(1);}
18%{transform:translateY(-55px) scaleX(.9) scaleY(1.1);}
35%{transform:translateY(-80px) scaleX(.88) scaleY(1.12);}
55%{transform:translateY(-30px) scaleX(.96) scaleY(1.04);}
70%{transform:translateY(0) scaleX(1.12) scaleY(.82);}
82%{transform:translateY(-8px) scaleX(.98) scaleY(1.02);}
100%{transform:translateY(0) scaleX(1) scaleY(1);}
}
</style>
</head>
